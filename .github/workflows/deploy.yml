name: Deploy Crown API (Java)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: build/libs/Crown_API-0.0.1-SNAPSHOT.jar
          target: /root/app/
          strip_components: 2

      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /root/app/start-crown.sh
            sleep 25
            if kill -0 $(cat /root/app/crown_api.pid) 2>/dev/null; then
              echo "Java API 재시작 완료 PID:$(cat /root/app/crown_api.pid)"
            else
              echo "ERROR: Java API 시작 실패"
              tail -30 /root/app/crown_api.log
              exit 1
            fi

      - name: Slack 알림
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="[배포 완료] Crown API (Java)\n시간: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST\n커밋: ${{ github.event.head_commit.message }}"
          else
            MSG="[배포 실패] Crown API (Java)\n시간: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST\n커밋: ${{ github.event.head_commit.message }}"
          fi
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MSG\"}" \
            ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
